name: 🛠 Android CI / Build & Release APK

on:
    push:
        branches: [master]
        tags: ["v*.*.*"]
    pull_request:
        branches: [master]

permissions:
    contents: write # allow creating/updating Releases & uploading assets
    actions: read # allow pulling marketplace actions

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    build_and_release:
        runs-on: ubuntu-latest

        steps:
            - name: 📂 Checkout code
              uses: actions/checkout@v3

            - name: 🚀 Cache pub deps
              uses: actions/cache@v3
              with:
                  path: ~/.pub-cache
                  key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.yaml') }}
                  restore-keys: ${{ runner.os }}-pub-

            - name: ☕️ Setup Java (Temurin 17)
              uses: actions/setup-java@v3
              with:
                  distribution: temurin
                  java-version: "17"

            - name: 🦋 Setup Flutter
              uses: subosito/flutter-action@v2
              with:
                  channel: stable

            - name: Create .env file from secrets
              run: |
                  echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
                  echo "SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}" >> .env

            - name: 📥 Get dependencies
              run: flutter pub get

            - name: ✅ Run tests
              run: flutter test --coverage

            - name: Generate env files (build_runner)
              run: dart run build_runner build --delete-conflicting-outputs

            - name: 🏗️ Build APKs
              run: flutter build apk --release --obfuscate --split-debug-info=build/debug-info

            - name: Upload APK artifact
              uses: actions/upload-artifact@v4
              with:
                  name: release-apk
                  path: build/app/outputs/flutter-apk/app-release.apk

            - name: 📦 Prepare artifacts
              run: |
                  mkdir -p artifacts
                  cp build/app/outputs/flutter-apk/*.apk artifacts/

            # ─────────────── ONLY ON TAGS ───────────────
            - name: 🏷️ Create or update Release
              if: startsWith(github.ref, 'refs/tags/v')
              uses: ncipollo/release-action@v1.16.0
              with:
                  tag: ${{ github.ref_name }}
                  name: Release ${{ github.ref_name }}
                  artifacts: artifacts/*.apk
                  token: ${{ secrets.GITHUB_TOKEN }}
